<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYPTEX // Secure Communication Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #00ff41;
            --dark-bg: #050505;
            --panel-bg: rgba(10, 10, 15, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--dark-bg);
            font-family: 'JetBrains Mono', monospace;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Grid Background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: -2;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* Scanline Effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.3;
        }

        /* Glitch Text Effect */
        .glitch {
            position: relative;
            animation: glitch-skew 1s infinite linear alternate-reverse;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 var(--neon-pink);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 var(--neon-cyan);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(78px, 9999px, 20px, 0); }
            40% { clip: rect(12px, 9999px, 6px, 0); }
            60% { clip: rect(65px, 9999px, 89px, 0); }
            80% { clip: rect(23px, 9999px, 67px, 0); }
            100% { clip: rect(91px, 9999px, 34px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 99px, 0); }
            20% { clip: rect(12px, 9999px, 43px, 0); }
            40% { clip: rect(87px, 9999px, 12px, 0); }
            60% { clip: rect(34px, 9999px, 78px, 0); }
            80% { clip: rect(56px, 9999px, 23px, 0); }
            100% { clip: rect(9px, 9999px, 91px, 0); }
        }

        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            10% { transform: skew(-2deg); }
            20% { transform: skew(2deg); }
            30% { transform: skew(0deg); }
            100% { transform: skew(0deg); }
        }

        /* Neon Glow Effects */
        .neon-border {
            box-shadow: 
                0 0 5px rgba(0, 243, 255, 0.5),
                0 0 10px rgba(0, 243, 255, 0.3),
                inset 0 0 5px rgba(0, 243, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.5);
        }

        .neon-text {
            text-shadow: 
                0 0 5px var(--neon-cyan),
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-cyan);
        }

        .neon-pink {
            color: var(--neon-pink);
            text-shadow: 
                0 0 5px var(--neon-pink),
                0 0 10px var(--neon-pink);
        }

        .neon-green {
            color: var(--neon-green);
            text-shadow: 
                0 0 5px var(--neon-green),
                0 0 10px var(--neon-green);
        }

        /* Custom Inputs */
        .cyber-input {
            background: rgba(0, 20, 30, 0.8);
            border: 1px solid rgba(0, 243, 255, 0.3);
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
            position: relative;
        }

        .cyber-input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 
                0 0 15px rgba(0, 243, 255, 0.4),
                inset 0 0 10px rgba(0, 243, 255, 0.1);
        }

        /* Buttons */
        .cyber-btn {
            background: linear-gradient(45deg, transparent 5%, rgba(0, 243, 255, 0.1) 5%);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.4), transparent);
            transition: left 0.5s;
        }

        .cyber-btn:hover::before {
            left: 100%;
        }

        .cyber-btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 
                0 0 20px rgba(0, 243, 255, 0.6),
                inset 0 0 10px rgba(0, 243, 255, 0.2);
            transform: translateY(-2px);
        }

        .cyber-btn:active {
            transform: translateY(0);
        }

        .cyber-btn.pink {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            background: linear-gradient(45deg, transparent 5%, rgba(255, 0, 255, 0.1) 5%);
        }

        .cyber-btn.pink:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 
                0 0 20px rgba(255, 0, 255, 0.6),
                inset 0 0 10px rgba(255, 0, 255, 0.2);
        }

        /* Terminal Window */
        .terminal {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 243, 255, 0.3);
            position: relative;
        }

        .terminal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-cyan));
            animation: terminalPulse 2s ease-in-out infinite;
        }

        @keyframes terminalPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .terminal-header {
            background: rgba(0, 243, 255, 0.1);
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid;
        }

        .dot-red { border-color: #ff5f56; background: rgba(255, 95, 86, 0.2); }
        .dot-yellow { border-color: #ffbd2e; background: rgba(255, 189, 46, 0.2); }
        .dot-green { border-color: #27c93f; background: rgba(39, 201, 63, 0.2); }

        /* Loading Animation */
        .loader {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
        }

        .loader div {
            position: absolute;
            top: 33px;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--neon-cyan);
            animation-timing-function: cubic-bezier(0, 1, 1, 0);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .loader div:nth-child(1) { left: 8px; animation: loader1 0.6s infinite; }
        .loader div:nth-child(2) { left: 8px; animation: loader2 0.6s infinite; }
        .loader div:nth-child(3) { left: 32px; animation: loader2 0.6s infinite; }
        .loader div:nth-child(4) { left: 56px; animation: loader3 0.6s infinite; }

        @keyframes loader1 {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        @keyframes loader3 {
            0% { transform: scale(1); }
            100% { transform: scale(0); }
        }

        @keyframes loader2 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(24px, 0); }
        }

        /* Binary Rain Effect */
        .binary-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.05;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--neon-cyan);
            overflow: hidden;
        }

        .binary-column {
            position: absolute;
            top: -100%;
            animation: rain linear infinite;
        }

        @keyframes rain {
            to { transform: translateY(100vh); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 4px;
        }

        /* Status Indicator */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Tab Animation */
        .tab-active {
            background: rgba(0, 243, 255, 0.15);
            border-bottom: 2px solid var(--neon-cyan);
        }

        /* Output Box */
        .output-box {
            background: rgba(0, 10, 20, 0.9);
            border: 1px solid rgba(0, 243, 255, 0.3);
            font-family: 'JetBrains Mono', monospace;
            position: relative;
            overflow: hidden;
        }

        .output-box::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Corner Decorations */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-cyan);
        }

        .corner-tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .corner-tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .corner-br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 20, 30, 0.95);
            border: 1px solid var(--neon-cyan);
            padding: 16px 24px;
            border-radius: 4px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        .toast.show {
            transform: translateX(0);
        }

        /* Mode Toggle */
        .mode-toggle {
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 4px;
            overflow: hidden;
        }

        .mode-option {
            position: relative;
            z-index: 2;
            transition: color 0.3s;
        }

        .mode-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: rgba(0, 243, 255, 0.2);
            border: 1px solid var(--neon-cyan);
            transition: transform 0.3s ease;
        }

        .mode-toggle.decrypt .mode-slider {
            transform: translateX(100%);
        }

        .mode-toggle.decrypt .encrypt-option { color: #666; }
        .mode-toggle:not(.decrypt) .decrypt-option { color: #666; }
        .mode-toggle.decrypt .decrypt-option { color: var(--neon-cyan); }
        .mode-toggle:not(.decrypt) .encrypt-option { color: var(--neon-cyan); }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="grid-bg"></div>
    <div class="scanlines"></div>
    <div class="binary-rain" id="binaryRain"></div>

    <!-- Main Container -->
    <div class="min-h-screen flex flex-col items-center justify-center p-4 relative z-10">
        
        <!-- Header -->
        <header class="mb-8 text-center">
            <div class="flex items-center justify-center gap-4 mb-2">
                <div class="status-dot"></div>
                <span class="text-xs text-cyan-400 tracking-[0.3em] opacity-70">SYSTEM ONLINE</span>
                <div class="status-dot"></div>
            </div>
            <h1 class="glitch text-5xl md:text-7xl font-bold mb-2" data-text="CRYPTEX">CRYPTEX</h1>
            <p class="text-cyan-400 text-sm tracking-[0.5em] opacity-70">SECURE COMMUNICATION PROTOCOL v2.0</p>
        </header>

        <!-- Main Terminal -->
        <div class="terminal w-full max-w-4xl neon-border rounded-lg overflow-hidden backdrop-blur-sm">
            
            <!-- Terminal Header -->
            <div class="terminal-header">
                <div class="terminal-dot dot-red"></div>
                <div class="terminal-dot dot-yellow"></div>
                <div class="terminal-dot dot-green"></div>
                <span class="ml-4 text-xs text-cyan-400 opacity-70 tracking-wider">ENCRYPTION_MODULE.exe</span>
                <span class="ml-auto text-xs text-cyan-400 opacity-50" id="clock">00:00:00</span>
            </div>

            <!-- Mode Toggle -->
            <div class="p-6 border-b border-cyan-900/30">
                <div class="flex justify-center">
                    <div class="mode-toggle flex w-64 h-12 cursor-pointer" id="modeToggle">
                        <div class="mode-slider"></div>
                        <div class="mode-option encrypt-option flex-1 flex items-center justify-center text-sm font-bold tracking-wider">
                            ENCRYPT
                        </div>
                        <div class="mode-option decrypt-option flex-1 flex items-center justify-center text-sm font-bold tracking-wider">
                            DECRYPT
                        </div>
                    </div>
                </div>
            </div>

            <!-- Encrypt Section -->
            <div id="encryptSection" class="p-6 space-y-6">
                
                <!-- Input Area -->
                <div class="relative">
                    <label class="block text-cyan-400 text-xs mb-2 tracking-wider flex items-center gap-2">
                        <span class="w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></span>
                        INPUT_MESSAGE
                    </label>
                    <textarea 
                        id="inputText" 
                        class="cyber-input w-full h-32 p-4 rounded resize-none text-sm leading-relaxed"
                        placeholder="Enter your secret message here..."
                    ></textarea>
                    <div class="corner corner-tl"></div>
                    <div class="corner corner-tr"></div>
                    <div class="corner corner-bl"></div>
                    <div class="corner corner-br"></div>
                </div>

                <!-- Password -->
                <div class="relative">
                    <label class="block text-pink-400 text-xs mb-2 tracking-wider flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full animate-pulse"></span>
                        PASSWORD_KEY
                    </label>
                    <input 
                        type="password" 
                        id="encryptPassword" 
                        class="cyber-input w-full p-4 rounded text-sm"
                        placeholder="Set a strong password..."
                    >
                    <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-xs text-pink-400 opacity-50">
                        [REQUIRED]
                    </div>
                </div>

                <!-- Action Button -->
                <button onclick="encrypt()" class="cyber-btn w-full py-4 rounded text-lg font-bold tracking-[0.2em] group">
                    <span class="group-hover:hidden">INITIALIZE_ENCRYPTION</span>
                    <span class="hidden group-hover:inline">EXECUTE_SEQUENCE</span>
                </button>

                <!-- Output -->
                <div id="encryptOutput" class="hidden space-y-4">
                    <div class="relative">
                        <label class="block text-green-400 text-xs mb-2 tracking-wider flex items-center gap-2">
                            <span class="w-2 h-2 bg-green-400 rounded-full"></span>
                            ENCRYPTED_PAYLOAD
                        </label>
                        <div class="output-box w-full p-4 rounded min-h-[100px] break-all text-green-400 text-sm font-mono relative">
                            <textarea 
                                id="encryptedText" 
                                readonly
                                class="w-full h-full bg-transparent border-none outline-none resize-none text-green-400 font-mono"
                            ></textarea>
                            <button onclick="copyToClipboard('encryptedText')" class="absolute top-2 right-2 p-2 hover:bg-cyan-400/20 rounded transition-colors" title="Copy">
                                <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <button onclick="shareLink()" class="cyber-btn pink flex-1 py-3 rounded text-sm tracking-wider">
                            GENERATE_SHARE_LINK
                        </button>
                        <button onclick="resetEncrypt()" class="cyber-btn flex-1 py-3 rounded text-sm tracking-wider opacity-70 hover:opacity-100">
                            CLEAR_DATA
                        </button>
                    </div>
                </div>
            </div>

            <!-- Decrypt Section -->
            <div id="decryptSection" class="p-6 space-y-6 hidden">
                
                <!-- Encrypted Input -->
                <div class="relative">
                    <label class="block text-green-400 text-xs mb-2 tracking-wider flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                        ENCRYPTED_PAYLOAD
                    </label>
                    <textarea 
                        id="decryptInput" 
                        class="cyber-input w-full h-32 p-4 rounded resize-none text-sm leading-relaxed text-green-400"
                        placeholder="Paste the encrypted code here..."
                    ></textarea>
                    <div class="corner corner-tl"></div>
                    <div class="corner corner-tr"></div>
                    <div class="corner corner-bl"></div>
                    <div class="corner corner-br"></div>
                </div>

                <!-- Password -->
                <div class="relative">
                    <label class="block text-pink-400 text-xs mb-2 tracking-wider flex items-center gap-2">
                        <span class="w-2 h-2 bg-pink-400 rounded-full animate-pulse"></span>
                        PASSWORD_KEY
                    </label>
                    <input 
                        type="password" 
                        id="decryptPassword" 
                        class="cyber-input w-full p-4 rounded text-sm"
                        placeholder="Enter the password..."
                    >
                </div>

                <!-- Action Button -->
                <button onclick="decrypt()" class="cyber-btn pink w-full py-4 rounded text-lg font-bold tracking-[0.2em] group">
                    <span class="group-hover:hidden">INITIALIZE_DECRYPTION</span>
                    <span class="hidden group-hover:inline">DECRYPT_SEQUENCE</span>
                </button>

                <!-- Output -->
                <div id="decryptOutput" class="hidden space-y-4">
                    <div class="relative">
                        <label class="block text-cyan-400 text-xs mb-2 tracking-wider flex items-center gap-2">
                            <span class="w-2 h-2 bg-cyan-400 rounded-full"></span>
                            DECRYPTED_MESSAGE
                        </label>
                        <div class="output-box w-full p-4 rounded min-h-[100px] text-cyan-400 text-sm relative">
                            <div id="decryptedText" class="whitespace-pre-wrap"></div>
                            <button onclick="copyToClipboard('decryptedText')" class="absolute top-2 right-2 p-2 hover:bg-cyan-400/20 rounded transition-colors" title="Copy">
                                <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <button onclick="resetDecrypt()" class="cyber-btn w-full py-3 rounded text-sm tracking-wider opacity-70 hover:opacity-100">
                        CLEAR_DATA
                    </button>
                </div>
            </div>

            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="hidden absolute inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50">
                <div class="text-center">
                    <div class="loader mb-4"><div></div><div></div><div></div><div></div></div>
                    <p class="text-cyan-400 text-sm tracking-widest animate-pulse" id="loadingText">PROCESSING...</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-8 text-center space-y-2">
            <p class="text-xs text-cyan-400/50 tracking-wider">END-TO-END ENCRYPTION • NO DATA STORED • CLIENT-SIDE ONLY</p>
            <div class="flex justify-center gap-4 text-xs">
                <span class="text-pink-400/70">AES-256-GCM</span>
                <span class="text-cyan-400/30">|</span>
                <span class="text-green-400/70">PBKDF2</span>
                <span class="text-cyan-400/30">|</span>
                <span class="text-cyan-400/70">Web Crypto API</span>
            </div>
        </footer>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <span id="toastMessage" class="text-cyan-400 text-sm tracking-wider"></span>
    </div>

    <script>
        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { 
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Binary Rain
        function createBinaryRain() {
            const container = document.getElementById('binaryRain');
            const chars = '01';
            
            for (let i = 0; i < 20; i++) {
                const column = document.createElement('div');
                column.className = 'binary-column';
                column.style.left = Math.random() * 100 + '%';
                column.style.animationDuration = (Math.random() * 3 + 2) + 's';
                column.style.animationDelay = Math.random() * 5 + 's';
                
                let text = '';
                for (let j = 0; j < 50; j++) {
                    text += chars[Math.floor(Math.random() * chars.length)] + '<br>';
                }
                column.innerHTML = text;
                container.appendChild(column);
            }
        }
        createBinaryRain();

        // Mode Toggle
        const modeToggle = document.getElementById('modeToggle');
        const encryptSection = document.getElementById('encryptSection');
        const decryptSection = document.getElementById('decryptSection');
        let isDecryptMode = false;

        modeToggle.addEventListener('click', () => {
            isDecryptMode = !isDecryptMode;
            modeToggle.classList.toggle('decrypt');
            
            if (isDecryptMode) {
                encryptSection.classList.add('hidden');
                decryptSection.classList.remove('hidden');
                // Check for URL params
                checkUrlParams();
            } else {
                encryptSection.classList.remove('hidden');
                decryptSection.classList.add('hidden');
            }
        });

        // Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Copy to clipboard
        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            const text = element.value || element.textContent;
            
            navigator.clipboard.writeText(text).then(() => {
                showToast('>> COPIED_TO_CLIPBOARD');
            });
        }

        // Loading
        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        // Crypto Functions
        async function deriveKey(password, salt) {
            const encoder = new TextEncoder();
            const keyMaterial = await window.crypto.subtle.importKey(
                'raw',
                encoder.encode(password),
                'PBKDF2',
                false,
                ['deriveBits', 'deriveKey']
            );
            
            return window.crypto.subtle.deriveKey(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: 100000,
                    hash: 'SHA-256'
                },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt', 'decrypt']
            );
        }

        async function encrypt() {
            const text = document.getElementById('inputText').value;
            const password = document.getElementById('encryptPassword').value;

            if (!text || !password) {
                showToast('>> ERROR: MISSING_PARAMETERS');
                return;
            }

            showLoading('ENCRYPTING_DATA...');

            try {
                const encoder = new TextEncoder();
                const salt = window.crypto.getRandomValues(new Uint8Array(16));
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                
                const key = await deriveKey(password, salt);
                const encrypted = await window.crypto.subtle.encrypt(
                    { name: 'AES-GCM', iv: iv },
                    key,
                    encoder.encode(text)
                );

                // Combine salt + iv + encrypted
                const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
                combined.set(salt, 0);
                combined.set(iv, salt.length);
                combined.set(new Uint8Array(encrypted), salt.length + iv.length);

                // Convert to base64
                const base64 = btoa(String.fromCharCode(...combined));
                
                // Format with markers
                const formatted = `CRYPTEX:${base64}`;
                
                document.getElementById('encryptedText').value = formatted;
                document.getElementById('encryptOutput').classList.remove('hidden');
                
                showToast('>> ENCRYPTION_SUCCESSFUL');
            } catch (error) {
                showToast('>> ERROR: ENCRYPTION_FAILED');
                console.error(error);
            } finally {
                hideLoading();
            }
        }

        async function decrypt() {
            const encryptedText = document.getElementById('decryptInput').value.trim();
            const password = document.getElementById('decryptPassword').value;

            if (!encryptedText || !password) {
                showToast('>> ERROR: MISSING_PARAMETERS');
                return;
            }

            showLoading('DECRYPTING_DATA...');

            try {
                // Remove marker if present
                const base64 = encryptedText.replace('CRYPTEX:', '');
                
                // Convert from base64
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }

                // Extract salt, iv, and encrypted data
                const salt = bytes.slice(0, 16);
                const iv = bytes.slice(16, 28);
                const encrypted = bytes.slice(28);

                const key = await deriveKey(password, salt);
                const decrypted = await window.crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: iv },
                    key,
                    encrypted
                );

                const decoder = new TextDecoder();
                const decryptedText = decoder.decode(decrypted);
                
                document.getElementById('decryptedText').textContent = decryptedText;
                document.getElementById('decryptOutput').classList.remove('hidden');
                
                showToast('>> DECRYPTION_SUCCESSFUL');
            } catch (error) {
                showToast('>> ERROR: INVALID_PASSWORD_OR_DATA');
                document.getElementById('decryptOutput').classList.add('hidden');
            } finally {
                hideLoading();
            }
        }

        function shareLink() {
            const encrypted = document.getElementById('encryptedText').value;
            if (!encrypted) return;

            const baseUrl = window.location.href.split('?')[0];
            const shareUrl = `${baseUrl}?mode=decrypt&data=${encodeURIComponent(encrypted)}`;
            
            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast('>> SHARE_LINK_COPIED');
            });
        }

        function checkUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode');
            const data = params.get('data');

            if (mode === 'decrypt' && data) {
                document.getElementById('decryptInput').value = data;
                showToast('>> ENCRYPTED_DATA_DETECTED');
            }
        }

        function resetEncrypt() {
            document.getElementById('inputText').value = '';
            document.getElementById('encryptPassword').value = '';
            document.getElementById('encryptedText').value = '';
            document.getElementById('encryptOutput').classList.add('hidden');
            showToast('>> DATA_CLEARED');
        }

        function resetDecrypt() {
            document.getElementById('decryptInput').value = '';
            document.getElementById('decryptPassword').value = '';
            document.getElementById('decryptedText').textContent = '';
            document.getElementById('decryptOutput').classList.add('hidden');
            showToast('>> DATA_CLEARED');
        }

        // Check URL params on load
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('mode') === 'decrypt') {
                modeToggle.click();
            }
        });

        // Enter key support
        document.getElementById('encryptPassword')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') encrypt();
        });
        document.getElementById('decryptPassword')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') decrypt();
        });
    </script>
</body>
</html>
